{% extends "admin/layout.html" %}
{% block breadcrumb %}<nav aria-label="breadcrumb"><ol class="breadcrumb small mb-0"><li class="breadcrumb-item"><a href="{{ url_for('admin.dashboard') }}">管理面板</a></li><li class="breadcrumb-item"><a href="{{ url_for('admin.forums') }}">论坛管理</a></li><li class="breadcrumb-item active">{{ title }}</li></ol></nav>{% endblock %}
{% block admin_content %}
<h4 class="mb-3"><i class="bi bi-{{ 'pencil-square' if forum else 'plus-circle' }}"></i> {{ title }}</h4>
<div class="card shadow-sm"><div class="card-body"><form method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row g-3"><div class="col-md-6"><label class="form-label small fw-bold">名称</label><input type="text" name="name" class="form-control form-control-sm" value="{{ forum.name if forum else '' }}" required></div>
    <div class="col-md-6"><label class="form-label small fw-bold">Slug</label><input type="text" name="slug" class="form-control form-control-sm" value="{{ forum.slug if forum else '' }}" required></div>
    <div class="col-12"><label class="form-label small fw-bold">描述</label><input type="text" name="description" class="form-control form-control-sm" value="{{ forum.description if forum else '' }}"></div>
    <div class="col-md-4"><label class="form-label small fw-bold">排序</label><input type="number" name="sort_order" class="form-control form-control-sm" value="{{ forum.sort_order if forum else 0 }}"></div>
    <div class="col-md-4"><label class="form-label small fw-bold">最低查看角色</label><select name="min_role_view" class="form-select form-select-sm">{% for r in roles %}<option value="{{ r }}" {% if forum and forum.min_role_view==r %}selected{% endif %}>{{ r }}</option>{% endfor %}</select></div>
    <div class="col-md-4"><label class="form-label small fw-bold">最低发帖角色</label><select name="min_role_post" class="form-select form-select-sm">{% for r in roles %}<option value="{{ r }}" {% if forum and forum.min_role_post==r %}selected{% endif %}>{{ r }}</option>{% endfor %}</select></div>
    </div><button type="submit" class="btn btn-primary mt-3"><i class="bi bi-save"></i> 保存</button>
    <a href="{{ url_for('admin.forums') }}" class="btn btn-secondary mt-3">取消</a></form></div></div>
{% endblock %}
