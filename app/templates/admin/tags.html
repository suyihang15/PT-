{% extends "admin/layout.html" %}
{% block breadcrumb %}<nav aria-label="breadcrumb"><ol class="breadcrumb small mb-0"><li class="breadcrumb-item"><a href="{{ url_for('admin.dashboard') }}">管理面板</a></li><li class="breadcrumb-item active">{{ title }}</li></ol></nav>{% endblock %}
{% block admin_content %}
<h4 class="mb-3"><i class="bi bi-tags"></i> 标签管理</h4>
<div class="card shadow-sm mb-3"><div class="card-body"><form method="POST" action="{{ url_for('admin.tag_add') }}" class="row g-2"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="col-md-3"><input type="text" name="name" class="form-control form-control-sm" placeholder="标签名称" required></div>
    <div class="col-md-2"><input type="text" name="slug" class="form-control form-control-sm" placeholder="Slug" required></div>
    <div class="col-md-2"><input type="color" name="color" class="form-control form-control-sm" value="#6c757d" title="颜色"></div>
    <div class="col-md-1"><input type="number" name="sort_order" class="form-control form-control-sm" value="0"></div>
    <div class="col-md-2"><button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg"></i> 添加标签</button></div>
</form></div></div>
<div class="card shadow-sm"><div class="table-responsive"><table class="table table-hover table-sm mb-0 small"><thead class="table-dark"><tr><th>ID</th><th>颜色</th><th>名称</th><th>Slug</th><th>排序</th><th>操作</th></tr></thead>
<tbody>{% for tag in tags %}<tr><td>{{ tag.id }}</td><td><span class="badge" style="background-color:{{ tag.color }}">&nbsp;&nbsp;&nbsp;</span> {{ tag.color }}</td>
    <td>{{ tag.name }}</td><td><code>{{ tag.slug }}</code></td><td>{{ tag.sort_order }}</td>
    <td><form method="POST" action="{{ url_for('admin.tag_edit', tag_id=tag.id) }}" class="d-inline"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input type="hidden" name="name" value="{{ tag.name }}"><input type="hidden" name="slug" value="{{ tag.slug }}"><input type="hidden" name="color" value="{{ tag.color }}"><input type="hidden" name="sort_order" value="{{ tag.sort_order }}"><button class="btn btn-outline-primary btn-sm"><i class="bi bi-pencil"></i></button></form>
    <form method="POST" action="{{ url_for('admin.tag_delete', tag_id=tag.id) }}" class="d-inline" onsubmit="return confirm('确定删除?')"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-outline-danger btn-sm"><i class="bi bi-trash"></i></button></form></td></tr>
{% endfor %}</tbody></table></div></div>
{% endblock %}
