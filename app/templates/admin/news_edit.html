{% extends "admin/layout.html" %}
{% block breadcrumb %}<nav aria-label="breadcrumb"><ol class="breadcrumb small mb-0"><li class="breadcrumb-item"><a href="{{ url_for('admin.dashboard') }}">管理面板</a></li><li class="breadcrumb-item"><a href="{{ url_for('admin.news_list') }}">新闻管理</a></li><li class="breadcrumb-item active">{{ title }}</li></ol></nav>{% endblock %}
{% block admin_content %}
<h4 class="mb-3"><i class="bi bi-{{ 'pencil-square' if article else 'plus-circle' }}"></i> {{ title }}</h4>
<div class="card shadow-sm"><div class="card-body"><form method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-2"><label class="form-label small fw-bold">标题</label><input type="text" name="title" class="form-control form-control-sm" value="{{ article.title if article else '' }}" required></div>
    <div class="mb-2"><label class="form-label small fw-bold">内容 (支持Markdown)</label><textarea name="content" class="form-control" rows="15">{{ article.content if article else '' }}</textarea></div>
    <div class="form-check form-check-inline mb-3"><input class="form-check-input" type="checkbox" name="is_pinned" {% if article and article.is_pinned %}checked{% endif %}><label class="form-check-label small">置顶</label></div>
    <div class="form-check form-check-inline mb-3"><input class="form-check-input" type="checkbox" name="is_published" {% if not article or article.is_published %}checked{% endif %}><label class="form-check-label small">发布</label></div>
    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> {{ '发布' if not article else '保存' }}</button>
    <a href="{{ url_for('admin.news_list') }}" class="btn btn-secondary">取消</a></form></div></div>
{% endblock %}
