{% extends "base.html" %}
{% block title %}发布种子 - {{ site_name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="mb-4"><i class="bi bi-cloud-upload"></i> 发布种子</h4>
                <div class="alert alert-info">
                    <i class="bi bi-info-circle"></i> 种子上传功能即将完善。目前请将 .torrent 文件放在 <code>storage/torrents/</code> 目录下。
                </div>
                <form method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">种子文件 (.torrent)</label>
                        <input type="file" name="torrent_file" class="form-control" accept=".torrent" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">种子名称</label>
                        <input type="text" name="name" class="form-control" required maxlength="512">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">分类</label>
                        <select name="category_id" class="form-select" required>
                            <option value="">选择分类...</option>
                            {% for cat in categories %}
                            <optgroup label="{{ cat.name }}">
                                <option value="{{ cat.id }}">{{ cat.name }}</option>
                                {% for sub in cat.children %}
                                <option value="{{ sub.id }}">&nbsp;&nbsp;{{ sub.name }}</option>
                                {% endfor %}
                            </optgroup>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">描述</label>
                        <textarea name="description" class="form-control" rows="6"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">画质</label>
                            <select name="quality" class="form-select">
                                <option value="">不设置</option>
                                <option>2160p</option>
                                <option>1080p</option>
                                <option>720p</option>
                                <option>480p</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">来源</label>
                            <select name="medium" class="form-select">
                                <option value="">不设置</option>
                                <option>BluRay</option>
                                <option>WEB-DL</option>
                                <option>HDTV</option>
                                <option>DVD</option>
                                <option>Remux</option>
                                <option>Encode</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="anonymous" class="form-check-input" id="anonymous">
                        <label class="form-check-label" for="anonymous">匿名发布</label>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-upload"></i> 发布种子
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
